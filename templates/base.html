{% load static %}
<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Autostock{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="brand" href="{% url 'dashboard' %}">
                <span class="brand-mark">A</span>
                <span>
                    <strong>Autostock</strong>
                    <small>Almacen automotriz</small>
                </span>
            </a>

            <nav class="nav-list" aria-label="Navegacion principal">
                <a class="nav-link active" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="nav-link disabled" href="#">Productos</a>
                <a class="nav-link disabled" href="#">Entradas</a>
                <a class="nav-link disabled" href="#">Salidas</a>
                <a class="nav-link disabled" href="#">Reportes</a>
            </nav>
        </aside>

        <main class="main-panel">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Sesion activa</p>
                    <h1>{% block page_title %}Panel{% endblock %}</h1>
                </div>
                <div class="user-box">
                    <span>{{ request.user.username }}</span>
                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-ghost" type="submit">Salir</button>
                    </form>
                </div>
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
